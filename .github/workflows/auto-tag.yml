name: Tag on main merge

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full tag history to find the highest patch

      - name: Derive next version tag
        id: ver
        run: |
          # MARKETING_VERSION is major.minor (e.g. "1.0", "1.1", "2.0")
          MARKETING=$(grep -m1 'MARKETING_VERSION' Tenvy.xcodeproj/project.pbxproj \
            | tr -d ' \t;' | cut -d= -f2)
          echo "Marketing version: $MARKETING"

          # Find the highest patch already tagged for this major.minor
          LAST_PATCH=$(git tag --list "v${MARKETING}.*" \
            | sed "s/v${MARKETING}\.//" \
            | grep -E '^[0-9]+$' \
            | sort -n \
            | tail -1)

          if [ -z "$LAST_PATCH" ]; then
            PATCH=0
          else
            PATCH=$((LAST_PATCH + 1))
          fi

          TAG="v${MARKETING}.${PATCH}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Next tag: $TAG"

      - name: Push tag
        run: |
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
          echo "Created tag ${{ steps.ver.outputs.tag }}"
