name: Release

on:
  push:
    branches: [main]

jobs:
  # Derive the next version tag. Skip the release entirely if the tag
  # already exists (doc/CI-only pushes that don't change the version).
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.ver.outputs.should_release }}
      tag: ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive next version tag
        id: ver
        run: |
          # Extract only major.minor from MARKETING_VERSION so "1.0.3" → "1.0".
          # This keeps tags in the v1.0.N format regardless of what the project
          # file stores in MARKETING_VERSION.
          MARKETING=$(grep -m1 'MARKETING_VERSION' Tenvy.xcodeproj/project.pbxproj \
            | tr -d ' \t;' | cut -d= -f2)
          BASE=$(echo "$MARKETING" | cut -d. -f1-2)
          echo "MARKETING_VERSION=$MARKETING  base=$BASE"

          # Find the highest patch already released for this major.minor
          LAST_PATCH=$(git tag --list "v${BASE}.*" \
            | sed "s/^v${BASE}\.//" \
            | grep -E '^[0-9]+$' \
            | sort -n \
            | tail -1)

          PATCH=$([ -z "$LAST_PATCH" ] && echo 0 || echo $((LAST_PATCH + 1)))
          TAG="v${BASE}.${PATCH}"
          VERSION="${BASE}.${PATCH}"

          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Next release: $TAG"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@v4
        with:
          path: ghostty/macos/GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules') }}-${{ hashFiles('ghostty/src/**/*.zig', 'ghostty/build.zig') }}

      - name: Install Zig
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: |
          ZIG_VERSION="0.15.2"
          mkdir -p /tmp/zig
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-aarch64-macos-${ZIG_VERSION}.tar.xz" \
            | tar -xJ -C /tmp/zig
          echo "/tmp/zig/zig-aarch64-macos-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build GhosttyKit.xcframework
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: ./scripts/build-ghosttykit.sh

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | grep -iv "beta" | sort -V | tail -1)
          echo "Using Xcode: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Get Xcode version for cache key
        id: xcode-version
        run: echo "version=$(xcodebuild -version | head -1 | tr ' ' '-')" >> "$GITHUB_OUTPUT"

      - name: Cache Metal Toolchain
        id: cache-metal
        uses: actions/cache@v4
        with:
          path: /tmp/metalToolchainExport
          key: metal-toolchain-${{ steps.xcode-version.outputs.version }}

      - name: Install Metal Toolchain (from cache)
        if: steps.cache-metal.outputs.cache-hit == 'true'
        run: |
          BUNDLE=$(ls /tmp/metalToolchainExport/*.exportedBundle 2>/dev/null | head -1)
          echo "Importing cached Metal toolchain: $BUNDLE"
          sudo xcodebuild -importComponent metalToolchain -importPath "$BUNDLE"

      - name: Install Metal Toolchain (download + export for cache)
        if: steps.cache-metal.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/metalToolchainExport
          for i in 1 2 3 4 5; do
            echo "Attempt $i: downloading Metal toolchain..."
            if sudo xcodebuild -downloadComponent MetalToolchain -exportPath /tmp/metalToolchainExport/; then
              echo "Download + export succeeded on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, waiting 30s before retry..."
            sleep 30
          done
          echo "All 5 attempts failed"
          exit 1

      - name: Install tools
        run: brew install create-dmg

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project Tenvy.xcodeproj \
            -scheme Tenvy \
            -configuration Release \
            -archivePath build/Tenvy.xcarchive \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION=${{ needs.check.outputs.version }}

      - name: Sign, notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          APP_PATH=$(find build/Tenvy.xcarchive/Products -name "*.app" | head -1)
          mkdir -p build/export
          cp -R "$APP_PATH" build/export/Tenvy.app

          find build/export/Tenvy.app/Contents -name "*.framework" -o -name "*.dylib" | sort -r | while read item; do
            codesign --force --sign "Developer ID Application" \
              --keychain "$KEYCHAIN_PATH" \
              --options runtime \
              "$item"
          done

          codesign --force --deep --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            --options runtime \
            --timestamp \
            build/export/Tenvy.app

          codesign --verify --deep --strict build/export/Tenvy.app

          ditto -c -k --keepParent build/export/Tenvy.app build/Tenvy.zip

          xcrun notarytool submit build/Tenvy.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple build/export/Tenvy.app

      - name: Create DMG
        run: |
          VERSION=${{ needs.check.outputs.version }}
          create-dmg \
            --volname "Tenvy $VERSION" \
            --window-size 600 380 \
            --icon-size 128 \
            --icon "Tenvy.app" 160 190 \
            --app-drop-link 440 190 \
            --no-internet-enable \
            "build/Tenvy-$VERSION.dmg" \
            "build/export/Tenvy.app"

      - name: Push tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ needs.check.outputs.tag }}
          VERSION=${{ needs.check.outputs.version }}

          git tag "$TAG"
          git push origin "$TAG"

          cat > /tmp/release-notes.md <<EOF
          ## Tenvy $TAG

          ### Installation
          1. Download \`Tenvy-$VERSION.dmg\`
          2. Open the DMG and drag **Tenvy** to your Applications folder
          3. Launch Tenvy from Applications

          ### Requirements
          - macOS 14.0 or later
          - [Claude Code CLI](https://docs.anthropic.com/en/docs/claude-code/overview) installed
          EOF

          gh release create "$TAG" "build/Tenvy-$VERSION.dmg" \
            --title "Tenvy $TAG" \
            --notes-file /tmp/release-notes.md

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ needs.check.outputs.version }}
          DMG="build/Tenvy-$VERSION.dmg"

          SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "SHA256: $SHA256"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Rostmen/homebrew-tenvy.git /tmp/homebrew-tenvy

          mkdir -p /tmp/homebrew-tenvy/Casks
          sed \
            -e "s/VERSION_PLACEHOLDER/$VERSION/g" \
            -e "s/SHA256_PLACEHOLDER/$SHA256/g" \
            scripts/tenvy.rb.template > /tmp/homebrew-tenvy/Casks/tenvy.rb

          cd /tmp/homebrew-tenvy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tenvy.rb
          git commit -m "Update Tenvy to $VERSION"
          git push

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain-db || true
