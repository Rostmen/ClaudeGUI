name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          # Decode certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Add to keychain search list (keep login keychain too)
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make it the default keychain
          security default-keychain -s "$KEYCHAIN_PATH"

          # Verify certificate is visible
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Archive
        run: |
          xcodebuild archive \
            -project Tenvy.xcodeproj \
            -scheme Tenvy \
            -configuration Release \
            -archivePath build/Tenvy.xcarchive \
            -skipPackagePluginValidation \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }} \
            | xcpretty

      - name: Export & notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Write export options with notarization credentials
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>notarization</key>
            <true/>
            <key>stapleNotarization</key>
            <true/>
          </dict>
          </plist>
          EOF

          # Store notarytool credentials
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

          xcodebuild -exportArchive \
            -archivePath build/Tenvy.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/export \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain"

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          create-dmg \
            --volname "Tenvy $VERSION" \
            --window-size 600 380 \
            --icon-size 128 \
            --icon "Tenvy.app" 160 190 \
            --app-drop-link 440 190 \
            --no-internet-enable \
            "build/Tenvy-$VERSION.dmg" \
            "build/export/Tenvy.app"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          gh release create "v$VERSION" "build/Tenvy-$VERSION.dmg" \
            --title "Tenvy v$VERSION" \
            --notes "## Tenvy v$VERSION

          ### Installation
          1. Download \`Tenvy-$VERSION.dmg\`
          2. Open the DMG and drag **Tenvy** to your Applications folder
          3. Launch Tenvy from Applications

          ### Requirements
          - macOS 14.0 or later
          - [Claude Code CLI](https://docs.anthropic.com/en/docs/claude-code/overview) installed"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain || true
