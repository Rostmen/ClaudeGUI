name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install create-dmg

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          # echo -n avoids a trailing newline that corrupts the .p12 decode
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project Tenvy.xcodeproj \
            -scheme Tenvy \
            -configuration Release \
            -archivePath build/Tenvy.xcarchive \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }}

      - name: Sign, notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Copy .app from archive
          APP_PATH=$(find build/Tenvy.xcarchive/Products -name "*.app" | head -1)
          mkdir -p build/export
          cp -R "$APP_PATH" build/export/Tenvy.app

          # Sign frameworks and dylibs inside the app first
          find build/export/Tenvy.app/Contents -name "*.framework" -o -name "*.dylib" | sort -r | while read item; do
            codesign --force --sign "Developer ID Application" \
              --keychain "$KEYCHAIN_PATH" \
              --options runtime \
              "$item"
          done

          # Sign the app bundle itself
          codesign --force --deep --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            --options runtime \
            --timestamp \
            build/export/Tenvy.app

          # Verify signature
          codesign --verify --deep --strict build/export/Tenvy.app

          # Zip for notarization
          ditto -c -k --keepParent build/export/Tenvy.app build/Tenvy.zip

          # Submit and wait for notarization result
          xcrun notarytool submit build/Tenvy.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the ticket to the app
          xcrun stapler staple build/export/Tenvy.app

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          create-dmg \
            --volname "Tenvy $VERSION" \
            --window-size 600 380 \
            --icon-size 128 \
            --icon "Tenvy.app" 160 190 \
            --app-drop-link 440 190 \
            --no-internet-enable \
            "build/Tenvy-$VERSION.dmg" \
            "build/export/Tenvy.app"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          gh release create "v$VERSION" "build/Tenvy-$VERSION.dmg" \
            --title "Tenvy v$VERSION" \
            --notes "## Tenvy v$VERSION

          ### Installation
          1. Download \`Tenvy-$VERSION.dmg\`
          2. Open the DMG and drag **Tenvy** to your Applications folder
          3. Launch Tenvy from Applications

          ### Requirements
          - macOS 14.0 or later
          - [Claude Code CLI](https://docs.anthropic.com/en/docs/claude-code/overview) installed"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain-db || true
